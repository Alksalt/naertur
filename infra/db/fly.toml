app = "naertur-db"
primary_region = "arn"

[build]
  image = "postgis/postgis:16-3.4"

[env]
  POSTGRES_DB = "naertur"
  POSTGRES_USER = "naertur"
  PGDATA = "/var/lib/postgresql/data/pgdata"

[mounts]
  source = "pgdata_v2"
  destination = "/var/lib/postgresql/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[services]]
  protocol = "tcp"
  internal_port = 5432
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
