<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NærTur — Mobile design</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #ECE6D8;
    font-family: "Schibsted Grotesk", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  @keyframes naertur-spin { to { transform: rotate(360deg); } }
  /* Hide scrollbars inside device frames */
  .naertur-app *::-webkit-scrollbar { width: 0; height: 0; }
  .naertur-app * { scrollbar-width: none; }
  /* Range slider polish */
  input[type=range] { -webkit-appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px; border-radius: 999px; background: rgba(0,0,0,.12);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--thumb, #2D3A2E); margin-top: -9px;
    box-shadow: 0 1px 3px rgba(0,0,0,.18), 0 0 0 4px rgba(255,255,255,.7);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--thumb, #2D3A2E); border: 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.18), 0 0 0 4px rgba(255,255,255,.7);
  }
  input[type=range]::-moz-range-track { height: 4px; background: rgba(0,0,0,.12); border-radius: 999px; }
  small { font-size: 0.55em; font-weight: 500; color: inherit; opacity: 0.55; margin-left: 1px; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data + components -->
<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Tweak defaults (edit-mode rewritable) ───────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "no",
  "theme": "moss",
  "showAndroid": true,
  "showWeb": true
}/*EDITMODE-END*/;

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const lang = t.lang;
  const palette = window.NAERTUR_PALETTES[t.theme] || window.NAERTUR_PALETTES.moss;
  const isDark = t.theme === 'mossDark';
  const L = window.I18N[lang];

  // Card sizes: native phone dims so the frame looks correct
  const iOSw = 402, iOSh = 874;
  const Andw = 412, Andh = 892;

  // Renders one stateful prototype inside a phone frame
  const phone = (platform, initialScreen, dark) => {
    const wrap = (
      <div className="naertur-app" style={{ width: '100%', height: '100%' }}>
        <NaerturApp platform={platform} t={L} lang={lang} palette={palette}
          statusH={platform === 'ios' ? 60 : 56}
          bottomH={platform === 'ios' ? 34 : 24}
          initialScreen={initialScreen} />
      </div>
    );
    if (platform === 'ios') return <IOSDevice dark={dark} width={iOSw} height={iOSh}>{wrap}</IOSDevice>;
    return <AndroidDevice dark={dark} width={Andw} height={Andh}>{wrap}</AndroidDevice>;
  };

  const screens = [
    { id: 'welcome',  label: lang === 'no' ? 'Velkomst' : 'Welcome' },
    { id: 'filters',  label: lang === 'no' ? 'Filtre' : 'Filters' },
    { id: 'finding',  label: lang === 'no' ? 'Finner tur' : 'Finding' },
    { id: 'result',   label: lang === 'no' ? 'Resultat' : 'Result' },
    { id: 'detail',   label: lang === 'no' ? 'Detaljer' : 'Detail' },
  ];

  return (
    <>
      <DesignCanvas
        title="NærTur"
        subtitle={lang === 'no'
          ? 'Én tapp. Få en nær tur som passer i dag. — Mobile-first PWA for Møre og Romsdal.'
          : 'One tap. A nearby hike that fits today. — Mobile-first PWA for Møre og Romsdal.'}
      >
        <DCSection id="ios" title="iPhone" subtitle={lang === 'no' ? 'Hele flyten — fra velkomst til detaljer' : 'Full flow — welcome through detail'}>
          {screens.map(s => (
            <DCArtboard key={s.id} id={'ios-' + s.id} label={s.label} width={iOSw} height={iOSh}>
              {phone('ios', s.id, isDark)}
            </DCArtboard>
          ))}
        </DCSection>

        {t.showAndroid && (
          <DCSection id="android" title="Android" subtitle={lang === 'no' ? 'Material 3, samme flyt' : 'Material 3, same flow'}>
            {screens.map(s => (
              <DCArtboard key={s.id} id={'and-' + s.id} label={s.label} width={Andw} height={Andh}>
                {phone('android', s.id, isDark)}
              </DCArtboard>
            ))}
          </DCSection>
        )}

        {t.showWeb && (
          <DCSection id="web" title={lang === 'no' ? 'Web' : 'Web'} subtitle={lang === 'no' ? 'PWA i nettleser — sentrert mobil-vy med fjord-bakgrunn' : 'PWA in browser — centered mobile view with fjord backdrop'}>
            <DCArtboard id="web-welcome" label={lang === 'no' ? 'Web · velkomst' : 'Web · welcome'} width={1280} height={820}>
              <WebFrame palette={palette} title="naertur.no" lang={lang}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 40, padding: '40px 60px', minHeight: '100%' }}>
                  <WebCopy palette={palette} lang={lang} L={L} />
                  <div style={{ flexShrink: 0 }}>
                    {phone('ios', 'welcome', isDark)}
                  </div>
                </div>
              </WebFrame>
            </DCArtboard>
            <DCArtboard id="web-result" label={lang === 'no' ? 'Web · resultat' : 'Web · result'} width={1280} height={820}>
              <WebFrame palette={palette} title="naertur.no/finn" lang={lang}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 40, padding: '40px 60px', minHeight: '100%' }}>
                  <div style={{ flexShrink: 0 }}>
                    {phone('ios', 'filters', isDark)}
                  </div>
                  <div style={{ flexShrink: 0 }}>
                    {phone('ios', 'result', isDark)}
                  </div>
                </div>
              </WebFrame>
            </DCArtboard>
          </DCSection>
        )}
      </DesignCanvas>

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label={lang === 'no' ? 'Innhold' : 'Content'} />
        <TweakRadio label={lang === 'no' ? 'Språk' : 'Language'} value={t.lang}
          options={[{ value: 'no', label: 'Norsk' }, { value: 'en', label: 'English' }]}
          onChange={(v) => setTweak('lang', v)} />
        <TweakSection label={lang === 'no' ? 'Tema' : 'Theme'} />
        <TweakSelect label={lang === 'no' ? 'Palett' : 'Palette'} value={t.theme}
          options={[
            { value: 'moss',     label: 'Moss (Light)' },
            { value: 'mossDark', label: 'Moss (Dark)' },
            { value: 'fjord',    label: 'Fjord' },
          ]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakSection label={lang === 'no' ? 'Visning' : 'Display'} />
        <TweakToggle label={lang === 'no' ? 'Vis Android' : 'Show Android'}
          value={t.showAndroid} onChange={(v) => setTweak('showAndroid', v)} />
        <TweakToggle label={lang === 'no' ? 'Vis Web' : 'Show Web'}
          value={t.showWeb} onChange={(v) => setTweak('showWeb', v)} />
      </TweaksPanel>
    </>
  );
}

// ── Web (browser) frame ─────────────────────────────────────────────────
function WebFrame({ children, palette, title, lang }) {
  const C = palette;
  return (
    <div style={{
      width: '100%', height: '100%',
      background: C.bg, borderRadius: 14, overflow: 'hidden',
      border: `1px solid ${C.border}`,
      display: 'flex', flexDirection: 'column',
      boxShadow: '0 30px 60px rgba(0,0,0,0.08)',
      fontFamily: '"Schibsted Grotesk", ui-sans-serif, system-ui, sans-serif',
    }}>
      {/* Browser chrome */}
      <div style={{
        height: 42, display: 'flex', alignItems: 'center', gap: 8,
        padding: '0 14px', borderBottom: `1px solid ${C.border}`,
        background: C.card,
      }}>
        <div style={{ display: 'flex', gap: 6 }}>
          <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#FF5F57' }} />
          <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#FEBC2E' }} />
          <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#28C840' }} />
        </div>
        <div style={{
          flex: 1, height: 26, borderRadius: 8, marginLeft: 18,
          background: C.bg, border: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 12, color: C.muted, gap: 6,
        }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2">
            <rect x="4" y="11" width="16" height="10" rx="2" />
            <path d="M8 11V7a4 4 0 0 1 8 0v4" />
          </svg>
          <span>{title}</span>
        </div>
      </div>
      {/* Backdrop scene */}
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, opacity: 0.35 }}>
          <SceneFjord palette={C} />
        </div>
        <div style={{
          position: 'absolute', inset: 0,
          background: `linear-gradient(180deg, transparent 0%, ${C.bg} 100%)`,
        }} />
        <div style={{ position: 'relative', height: '100%' }}>{children}</div>
      </div>
    </div>
  );
}

function WebCopy({ palette, lang, L }) {
  const C = palette;
  return (
    <div style={{ maxWidth: 480, color: C.ink }}>
      <NaerturMark color={C.ink} peakColor={C.accent} size={28} />
      <h1 style={{
        margin: '24px 0 16px', fontSize: 64, lineHeight: 0.98, letterSpacing: -2,
        fontWeight: 600, textWrap: 'balance', color: C.ink,
      }}>{L.tagline}</h1>
      <p style={{ margin: 0, color: C.muted, fontSize: 18, lineHeight: 1.45, maxWidth: 440 }}>
        {L.welcomeSub}
      </p>
      <div style={{ display: 'flex', gap: 10, marginTop: 28, flexWrap: 'wrap' }}>
        <div style={{
          padding: '8px 14px 8px 12px', borderRadius: 999,
          background: 'rgba(0,0,0,0.04)', fontSize: 13.5,
          display: 'inline-flex', alignItems: 'center', gap: 6, color: C.ink,
        }}>
          🌿 {L.aboutLine1}
        </div>
        <div style={{
          padding: '8px 14px 8px 12px', borderRadius: 999,
          background: 'rgba(0,0,0,0.04)', fontSize: 13.5,
          display: 'inline-flex', alignItems: 'center', gap: 6, color: C.ink,
        }}>
          ⚡ {L.aboutLine2}
        </div>
      </div>
      <div style={{
        marginTop: 36, padding: 18, borderRadius: 16,
        background: C.card, border: `1px solid ${C.border}`,
        display: 'flex', alignItems: 'center', gap: 14,
        maxWidth: 360,
      }}>
        <div style={{
          width: 44, height: 44, borderRadius: 12, background: C.accent,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={C.accentInk} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
          </svg>
        </div>
        <div>
          <div style={{ fontWeight: 600, fontSize: 14 }}>
            {lang === 'no' ? 'Installer som app' : 'Install as app'}
          </div>
          <div style={{ fontSize: 12.5, color: C.muted, marginTop: 2 }}>
            {lang === 'no' ? 'Fungerer offline. Ingen App Store.' : 'Works offline. No App Store.'}
          </div>
        </div>
      </div>
    </div>
  );
}

window.WebFrame = WebFrame;
window.WebCopy = WebCopy;

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
