<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NærTur — Trail Map</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400..800&family=Newsreader:ital,wght@1,400..600&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #ECE6D7;
    font-family: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  .naertur-app *::-webkit-scrollbar { width: 0; height: 0; }
  .naertur-app * { scrollbar-width: none; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data + shared icons + frames -->
<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- v2: Trail Map app (overrides window.NaerturApp) -->
<script type="text/babel" src="app-trail.jsx"></script>

<!-- Bundler splash thumbnail -->
<template id="__bundler_thumbnail" data-bg-color="#F2EFE7">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F2EFE7"/>
    <g fill="none" stroke="#B7AC93" stroke-width="3">
      <ellipse cx="700" cy="380" rx="180" ry="120"/>
      <ellipse cx="700" cy="380" rx="240" ry="170"/>
      <ellipse cx="700" cy="380" rx="310" ry="225"/>
    </g>
    <g fill="none" stroke="#8E826A" stroke-width="4">
      <ellipse cx="700" cy="380" rx="120" ry="75"/>
    </g>
    <path d="M280 600 Q420 540, 540 480 T700 380" fill="none" stroke="#C8242C" stroke-width="8" stroke-linecap="round"/>
    <polygon points="280,600 296,580 264,580" fill="#C8242C"/>
    <polygon points="700,380 720,400 680,400" fill="#141413"/>
    <text x="600" y="200" font-family="sans-serif" font-weight="800" font-size="92" fill="#141413" text-anchor="middle" letter-spacing="-4">NÆRTUR</text>
  </svg>
</template>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "no",
  "theme": "trailhead",
  "accent": "brick",
  "showAndroid": true,
  "showWeb": true
}/*EDITMODE-END*/;

// ── Accent presets ─────────────────────────────────────────────────────
// Replaces the palette's vermillion-family slot. Each preset gives a base,
// a contrasting ink for text-on-accent, a soft tint for backgrounds, and an
// edge tone for shadows. Light + dark variants per preset.
const ACCENT_PRESETS = {
  vermillion: { // original — fiery red (kept for comparison)
    name: 'Vermillion',
    light: { base: '#C8242C', ink: '#FAF8F2', tint: 'rgba(200,36,44,0.08)',  edge: 'rgba(200,36,44,0.22)' },
    dark:  { base: '#E0353D', ink: '#0E0D0B', tint: 'rgba(224,53,61,0.12)',  edge: 'rgba(224,53,61,0.28)' },
  },
  brick: { // softer, dustier red — still warm, far less shouty
    name: 'Brick',
    light: { base: '#A04A3E', ink: '#FAF8F2', tint: 'rgba(160,74,62,0.08)',  edge: 'rgba(160,74,62,0.20)' },
    dark:  { base: '#C56858', ink: '#0E0D0B', tint: 'rgba(197,104,88,0.12)', edge: 'rgba(197,104,88,0.26)' },
  },
  terracotta: { // warm clay / orange-shifted red — friendly, earthy
    name: 'Terracotta',
    light: { base: '#B86A3D', ink: '#FAF8F2', tint: 'rgba(184,106,61,0.08)', edge: 'rgba(184,106,61,0.20)' },
    dark:  { base: '#D78A5C', ink: '#0E0D0B', tint: 'rgba(215,138,92,0.12)', edge: 'rgba(215,138,92,0.26)' },
  },
  moss: { // deep moss-green — outdoor, calm, very on-brand for hiking
    name: 'Moss',
    light: { base: '#3F6B45', ink: '#F2EFE7', tint: 'rgba(63,107,69,0.08)',  edge: 'rgba(63,107,69,0.20)' },
    dark:  { base: '#6FA37A', ink: '#0E0D0B', tint: 'rgba(111,163,122,0.12)',edge: 'rgba(111,163,122,0.26)' },
  },
  slate: { // quiet ink-blue — sophisticated, neutral
    name: 'Slate',
    light: { base: '#344A5E', ink: '#F2EFE7', tint: 'rgba(52,74,94,0.08)',   edge: 'rgba(52,74,94,0.20)' },
    dark:  { base: '#7B97AE', ink: '#0E0D0B', tint: 'rgba(123,151,174,0.12)',edge: 'rgba(123,151,174,0.26)' },
  },
  ink: { // monochrome — no chromatic accent, ultimate restraint
    name: 'Ink',
    light: { base: '#141413', ink: '#F2EFE7', tint: 'rgba(20,20,19,0.06)',   edge: 'rgba(20,20,19,0.18)' },
    dark:  { base: '#F2EFE7', ink: '#0E0D0B', tint: 'rgba(242,239,231,0.10)',edge: 'rgba(242,239,231,0.22)' },
  },
};

function applyAccent(palette, accentKey, isDark) {
  const preset = ACCENT_PRESETS[accentKey] || ACCENT_PRESETS.brick;
  const a = isDark ? preset.dark : preset.light;
  return {
    ...palette,
    vermillion: a.base,
    vermillionInk: a.ink,
    vermillionTint: a.tint,
    vermillionEdge: a.edge,
  };
}

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const lang = t.lang;
  const basePalette = window.TRAIL_PALETTES[t.theme] || window.TRAIL_PALETTES.trailhead;
  const isDark = t.theme === 'nightMap';
  const palette = applyAccent(basePalette, t.accent, isDark);
  const L = window.I18N[lang];

  const iOSw = 402, iOSh = 874;
  const Andw = 412, Andh = 892;

  const phone = (platform, initialScreen, dark) => {
    const wrap = (
      <div className="naertur-app" style={{ width: '100%', height: '100%' }}>
        <NaerturApp platform={platform} t={L} lang={lang} palette={palette}
          statusH={platform === 'ios' ? 60 : 56}
          bottomH={platform === 'ios' ? 34 : 24}
          initialScreen={initialScreen} />
      </div>
    );
    if (platform === 'ios') return <IOSDevice dark={dark} width={iOSw} height={iOSh}>{wrap}</IOSDevice>;
    return <AndroidDevice dark={dark} width={Andw} height={Andh}>{wrap}</AndroidDevice>;
  };

  const screens = [
    { id: 'welcome',  label: lang === 'no' ? 'Velkomst' : 'Welcome' },
    { id: 'filters',  label: lang === 'no' ? 'Filtre' : 'Filters' },
    { id: 'finding',  label: lang === 'no' ? 'Søker' : 'Searching' },
    { id: 'result',   label: lang === 'no' ? 'Tur' : 'Hike' },
    { id: 'detail',   label: lang === 'no' ? 'Detaljer' : 'Detail' },
  ];

  return (
    <>
      <DesignCanvas
        title="NærTur · Trail Map"
        subtitle={lang === 'no'
          ? 'Topografisk redesign · vermillion-aksent · vårfjær-animasjoner'
          : 'Topographic redesign · vermillion accent · spring-physics motion'}
      >
        <DCSection id="ios" title="iPhone" subtitle={lang === 'no' ? 'Hele flyten' : 'Full flow'}>
          {screens.map(s => (
            <DCArtboard key={s.id} id={'ios-' + s.id} label={s.label} width={iOSw} height={iOSh}>
              {phone('ios', s.id, isDark)}
            </DCArtboard>
          ))}
        </DCSection>

        {t.showAndroid && (
          <DCSection id="android" title="Android" subtitle={lang === 'no' ? 'Material 3 Expressive — rektangulære CTAs' : 'Material 3 Expressive — rectangular CTAs'}>
            {screens.map(s => (
              <DCArtboard key={s.id} id={'and-' + s.id} label={s.label} width={Andw} height={Andh}>
                {phone('android', s.id, isDark)}
              </DCArtboard>
            ))}
          </DCSection>
        )}

        {t.showWeb && (
          <DCSection id="web" title={lang === 'no' ? 'Web · PWA' : 'Web · PWA'} subtitle={lang === 'no' ? 'Mobil sentrert i nettleser, topografisk bakgrunn' : 'Mobile UI centered in browser, topographic backdrop'}>
            <DCArtboard id="web-welcome" label={lang === 'no' ? 'Velkomst' : 'Welcome'} width={1280} height={820}>
              <WebFrame palette={palette} title="naertur.no" lang={lang}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 56, padding: '40px 60px', minHeight: '100%' }}>
                  <WebCopy palette={palette} lang={lang} L={L} />
                  <div style={{ flexShrink: 0 }}>{phone('ios', 'welcome', isDark)}</div>
                </div>
              </WebFrame>
            </DCArtboard>
            <DCArtboard id="web-result" label={lang === 'no' ? 'Tur i nettleser' : 'Hike in browser'} width={1280} height={820}>
              <WebFrame palette={palette} title="naertur.no/finn" lang={lang}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 36, padding: '40px 60px', minHeight: '100%' }}>
                  <div style={{ flexShrink: 0 }}>{phone('ios', 'filters', isDark)}</div>
                  <div style={{ flexShrink: 0 }}>{phone('ios', 'result', isDark)}</div>
                </div>
              </WebFrame>
            </DCArtboard>
          </DCSection>
        )}
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label={lang === 'no' ? 'Innhold' : 'Content'} />
        <TweakRadio label={lang === 'no' ? 'Språk' : 'Language'} value={t.lang}
          options={[{ value: 'no', label: 'Norsk' }, { value: 'en', label: 'English' }]}
          onChange={(v) => setTweak('lang', v)} />
        <TweakSection label={lang === 'no' ? 'Tema' : 'Theme'} />
        <TweakSelect label={lang === 'no' ? 'Palett' : 'Palette'} value={t.theme}
          options={[
            { value: 'trailhead', label: 'Trailhead (Light)' },
            { value: 'nightMap',  label: 'Night Map (Dark)' },
            { value: 'fjordTrail', label: 'Fjord' },
          ]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakSelect label={lang === 'no' ? 'Aksentfarge' : 'Accent'}
          value={t.accent}
          options={[
            { value: 'brick',      label: 'Brick — softer red' },
            { value: 'terracotta', label: 'Terracotta — warm clay' },
            { value: 'moss',       label: 'Moss — outdoor green' },
            { value: 'slate',      label: 'Slate — quiet blue' },
            { value: 'ink',        label: 'Ink — monochrome' },
            { value: 'vermillion', label: 'Vermillion (original)' },
          ]}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSection label={lang === 'no' ? 'Visning' : 'Display'} />
        <TweakToggle label={lang === 'no' ? 'Vis Android' : 'Show Android'}
          value={t.showAndroid} onChange={(v) => setTweak('showAndroid', v)} />
        <TweakToggle label={lang === 'no' ? 'Vis Web' : 'Show Web'}
          value={t.showWeb} onChange={(v) => setTweak('showWeb', v)} />
      </TweaksPanel>
    </>
  );
}

// ── Web (browser) frame with topo backdrop ──────────────────────────────
function WebFrame({ children, palette, title, lang }) {
  const C = palette;
  return (
    <div style={{
      width: '100%', height: '100%',
      background: C.paper, borderRadius: 10, overflow: 'hidden',
      border: `1px solid ${C.hairline}`,
      display: 'flex', flexDirection: 'column',
      boxShadow: '0 30px 60px rgba(0,0,0,0.08)',
      fontFamily: '"Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif',
    }}>
      <div style={{
        height: 44, display: 'flex', alignItems: 'center', gap: 8,
        padding: '0 14px', borderBottom: `1px solid ${C.hairline}`,
        background: C.snow,
      }}>
        <div style={{ display: 'flex', gap: 6 }}>
          <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#FF5F57' }} />
          <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#FEBC2E' }} />
          <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#28C840' }} />
        </div>
        <div style={{
          flex: 1, height: 28, borderRadius: 5, marginLeft: 18,
          background: C.paper, border: `1px solid ${C.hairline}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 12.5, color: C.graphite, gap: 6, fontWeight: 500,
          fontFamily: 'ui-monospace, monospace',
        }}>
          <span style={{ color: C.vermillion }}>●</span>
          <span>{title}</span>
        </div>
      </div>
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        {/* Topographic backdrop */}
        <div style={{ position: 'absolute', inset: 0, opacity: 0.5 }}>
          <TopoMap palette={C} hike={null} drawOn={false} height="100%" mode="bg" showTrail={false} />
        </div>
        <div style={{
          position: 'absolute', inset: 0,
          background: `radial-gradient(ellipse at center, transparent, ${C.paper})`,
        }} />
        <div style={{ position: 'relative', height: '100%' }}>{children}</div>
      </div>
    </div>
  );
}

function WebCopy({ palette, lang, L }) {
  const C = palette;
  return (
    <div style={{ maxWidth: 480, color: C.ink }}>
      <div style={{
        fontFamily: 'ui-monospace, monospace', fontSize: 11, fontWeight: 600,
        color: C.vermillion, letterSpacing: 1.2, marginBottom: 16,
      }}>NÆRTUR · MØRE OG ROMSDAL · MVP</div>
      <Wordmark C={C} size={30} />
      <h1 style={{
        margin: '28px 0 14px', fontSize: 76, lineHeight: 0.92, letterSpacing: -3,
        fontWeight: 700, textWrap: 'balance', color: C.ink,
        fontVariationSettings: '"wdth" 95',
      }}>
        {lang === 'no' ? 'Én tapp.\nÉn tur. ' : 'One tap.\nOne hike. '}
        <span style={{
          color: C.vermillion, fontStyle: 'italic',
          fontFamily: '"Newsreader", serif', fontWeight: 500, letterSpacing: -2.5,
        }}>{lang === 'no' ? 'I dag.' : 'Today.'}</span>
      </h1>
      <p style={{ margin: 0, color: C.graphite, fontSize: 19, lineHeight: 1.45, maxWidth: 460 }}>
        {L.welcomeSub}
      </p>

      <div style={{
        marginTop: 36, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
        gap: 0, borderTop: `1px solid ${C.hairline}`, borderBottom: `1px solid ${C.hairline}`,
        padding: '16px 0',
      }}>
        <FactCellLarge C={C} label={lang === 'no' ? 'TURER' : 'HIKES'} value="124" />
        <FactCellLarge C={C} label={lang === 'no' ? 'SESONG' : 'SEASON'} value={lang === 'no' ? 'Åpen' : 'Open'} />
        <FactCellLarge C={C} label={lang === 'no' ? 'VARSEL' : 'ALERT'} value="0" last />
      </div>

      <div style={{
        marginTop: 28, padding: '16px 20px',
        background: C.snow, border: `1px solid ${C.hairline}`, borderRadius: 6,
        display: 'flex', alignItems: 'center', gap: 14,
        maxWidth: 420,
      }}>
        <div style={{
          width: 42, height: 42, borderRadius: 6, background: C.vermillion,
          display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={C.vermillionInk} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 12h18M12 3v18" />
          </svg>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14.5, fontWeight: 700, letterSpacing: -0.2 }}>
            {lang === 'no' ? 'Installer som app' : 'Install as app'}
          </div>
          <div style={{ fontSize: 12.5, color: C.graphite, marginTop: 2 }}>
            {lang === 'no' ? 'Fungerer offline. Ingen App Store.' : 'Works offline. No App Store.'}
          </div>
        </div>
        <div style={{
          fontFamily: 'ui-monospace, monospace', fontSize: 10, color: C.graphite, letterSpacing: 0.5,
        }}>PWA</div>
      </div>
    </div>
  );
}

function FactCellLarge({ C, label, value, last }) {
  return (
    <div style={{
      padding: '4px 16px', borderRight: last ? 'none' : `1px solid ${C.hairlineSoft}`,
    }}>
      <div style={{
        fontFamily: 'ui-monospace, monospace', fontSize: 10.5, fontWeight: 600,
        color: C.graphite, letterSpacing: 0.8,
      }}>{label}</div>
      <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: -1.2, marginTop: 4,
        fontVariantNumeric: 'tabular-nums', color: C.ink }}>{value}</div>
    </div>
  );
}

window.WebFrame = WebFrame;
window.WebCopy = WebCopy;
window.FactCellLarge = FactCellLarge;

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
